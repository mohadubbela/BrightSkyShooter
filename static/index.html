<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bright Sky Shooter</title>

<link rel="stylesheet" href="/static/style.css">
<script defer src="/static/script.js"></script>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <img src="/static/Banner.png" />
  <div class="hero-overlay"></div>

  <div class="hero-inner">
    <div class="brand">
      <img src="/static/BSS-Logo.png" />
      <h1>Bright Sky Shooter</h1>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- LOGIN -->
  <div class="login-card" id="loginBox">
    <h2>Login</h2>

    <form id="loginForm">
      <input type="password" id="password" placeholder="Password" />
      <button type="submit">Login</button>
      <div id="loginError" class="error"></div>
    </form>
  </div>

  <!-- PANEL -->
  <div id="backendUI" class="panel hidden">

    <h2>BrightSky Database</h2>

    <div class="controls">
      <input id="search" placeholder="Search contacts..." />
      <button id="prevBtn">Previous</button>
      <button id="nextBtn">Next</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Last</th>
          <th>First</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Birthdate</th>
          <th>Address</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <div id="status"></div>

  </div>
</div>

<!-- MODAL -->
<div id="detailsModal" class="modal hidden">
  <div class="modal-content">
    <span id="closeModal">×</span>
    <div id="modalDetails"></div>
  </div>
</div>

</body>
</html>
