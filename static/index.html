<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bright Sky Shooter</title>

<link rel="icon" type="image/png" sizes="32x32" href="/static/Shooter.png">
<link rel="icon" type="image/png" sizes="16x16" href="/static/Shooter.png">
<link rel="apple-touch-icon" href="/static/Shooter.png">

<style>

body{
margin:0;
font-family:'Segoe UI',Arial,sans-serif;
color:#e0e0e0;
min-height:100vh;
background:#0f0f12;
}

body::before{
content:"";
position:fixed;
inset:0;
z-index:-1;
background:linear-gradient(
135deg,
#0f0f12 0%,
#14151b 40%,
#1a1b21 100%
);
}

/* HERO */

.hero{
position:relative;
height:260px;
overflow:hidden;
}

.hero img{
width:100%;
height:100%;
object-fit:cover;
filter:brightness(.75);
}

.hero-overlay{
position:absolute;
inset:0;
background:linear-gradient(
to bottom,
rgba(0,0,0,.2),
rgba(10,10,14,.95)
);
}

.hero-inner{
position:absolute;
bottom:28px;
left:50%;
transform:translateX(-50%);
width:1200px;
max-width:92%;
display:flex;
justify-content:center;
}

.brand-center{
display:flex;
align-items:center;
gap:14px;
}

.brand-center img{
height:44px;
}

.brand-center h1{
font-size:28px;
margin:0;
letter-spacing:1px;
text-shadow:0 0 12px rgba(0,255,120,.5);
}

/* MAIN */

.main{
max-width:1200px;
margin:0 auto;
padding:40px 20px;
}

/* LOGIN */

.login-card{
width:360px;
margin:40px auto;
padding:30px;

background:rgba(30,30,40,.65);
border-radius:16px;
border:1px solid rgba(255,255,255,.08);
backdrop-filter:blur(16px);

box-shadow:
0 0 60px rgba(0,0,0,.7),
0 0 20px rgba(0,255,120,.06);

text-align:center;
}

.login-card input{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #333;
background:#0f0f0f;
color:#00ff88;
font-family:monospace;
margin-bottom:14px;
}

.login-card button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:linear-gradient(90deg,#00ff88,#00ff00);
font-weight:bold;
cursor:pointer;
}

/* PANEL */

.panel{
background:rgba(30,30,40,.65);
border-radius:16px;
padding:26px;
border:1px solid rgba(255,255,255,.08);
backdrop-filter:blur(14px);
}

/* CONTROLS */

.controls{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:20px;
align-items:center;
}

.controls input{
padding:8px;
border-radius:6px;
border:1px solid #333;
background:#181818;
color:#00ff88;
font-family:monospace;
}

/* FIXED BUTTON STYLE */

.controls button{
padding:8px 16px;
border:none;
border-radius:6px;
background:linear-gradient(90deg,#00ff88,#00ff00);
font-weight:bold;
cursor:pointer;
color:#000;
transition:.2s;
}

.controls button:hover{
box-shadow:0 0 10px rgba(0,255,120,.6);
transform:translateY(-1px);
}

.controls button:disabled{
opacity:0.4;
cursor:not-allowed;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
background:rgba(20,20,20,.7);
border-radius:10px;
overflow:hidden;
}

th,td{
padding:12px;
border-bottom:1px solid #333;
font-family:monospace;
}

th{
background:#232526;
color:#00ff88;
}

tr:hover{
background:#1a1a1a;
cursor:pointer;
}

/* STATUS */

#status{
margin-top:12px;
font-family:monospace;
color:#aaa;
}

/* MOBILE */

@media(max-width:800px){

th:nth-child(7),
td:nth-child(7){
display:none;
}

th:nth-child(6),
td:nth-child(6){
display:none;
}

}

/* MODAL */

#detailsModal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.6);
display:flex;
align-items:center;
justify-content:center;
z-index:1000;
}

.modal-content{
background:#1c1c1c;
padding:28px;
border-radius:14px;
max-height:80vh;
overflow:auto;
width:500px;
max-width:90%;
}

.close-btn{
position:absolute;
top:10px;
right:14px;
font-size:26px;
cursor:pointer;
color:#ff5252;
}

body::after{
content:"";
position:fixed;
right:-140px;
bottom:-120px;
width:520px;
height:520px;
background:url("/static/Shooter.png") no-repeat;
background-size:contain;
opacity:.06;
pointer-events:none;
}

</style>
</head>

<body>

<!-- HERO -->

<div class="hero">

<img src="/static/Banner.png">

<div class="hero-overlay"></div>

<div class="hero-inner">
<div class="brand-center">
<img src="/static/BSS-Logo.png">
<h1>Bright Sky Shooter</h1>
</div>
</div>

</div>

<!-- MAIN -->

<div class="main">

<div class="login-card" id="loginBox">

<h2>> Shooters Login</h2>

<form id="loginForm">
<input type="password" id="password" placeholder="Password">
<button type="submit">Login</button>
<div id="loginError" style="color:#ff5252;display:none;"></div>
</form>

</div>

<div id="backendUI" style="display:none" class="panel">

<h2>BrightSky Database</h2>

<div class="controls">

Search:
<input id="search" placeholder="Type to search...">

<button id="prevBtn">Previous</button>
<button id="nextBtn">Next</button>

</div>

<table id="table">
<thead>
<tr>
<th>Name</th>
<th>LastName</th>
<th>FirstName</th>
<th>Email</th>
<th>Phone</th>
<th>Birthdate</th>
<th>Address</th>
</tr>
</thead>

<tbody></tbody>
</table>

<div id="status"></div>

</div>
</div>

<div id="detailsModal" style="display:none">
<div class="modal-content">
<span class="close-btn" id="closeModal">×</span>
<h3>Contact Details</h3>
<div id="modalDetails"></div>
</div>
</div>

<script>

let offset = 0
let total = 0
let pageSize = window.innerWidth < 800 ? 100 : 1000
let authenticated = false
let searchTimer = null
let searchStart = 0

function escape(text){
if(!text) return ""
return text.replaceAll("&","&amp;")
.replaceAll("<","&lt;")
.replaceAll(">","&gt;")
}

function params(){
return new URLSearchParams({
q:document.getElementById("search").value,
offset:offset
})
}

async function load(){

if(!authenticated) return

const status = document.getElementById("status")

searchStart = Date.now()
status.innerText="Searching..."

let res = await fetch("/api/search?"+params())
let data = await res.json()

total = data.total

let tbody = document.querySelector("#table tbody")
tbody.innerHTML=""

data.results.forEach(c=>{

let tr=document.createElement("tr")

tr.innerHTML=`
<td>${escape(c.name)}</td>
<td>${escape(c.lastname)}</td>
<td>${escape(c.firstname)}</td>
<td>${escape(c.email)}</td>
<td>${escape(c.phone)}</td>
<td>${escape(c.birthdate)}</td>
<td>${escape(c.address)}</td>
`

/* CLICK ROW -> DETAILS */

tr.onclick=()=>details(c.id)

tbody.appendChild(tr)

})

let elapsed=((Date.now()-searchStart)/1000).toFixed(2)

let page=Math.floor(offset/pageSize)+1
let pages=Math.ceil(total/pageSize)

status.innerText=`Page ${page} / ${pages} • ${total.toLocaleString()} results • ${elapsed}s`

}

/* DETAILS MODAL */

async function details(id){

let res=await fetch("/api/contact/"+id)
let data=await res.json()

let html="<table>"

for(const [key,value] of Object.entries(data)){

html+=`
<tr>
<th>${escape(key)}</th>
<td class="copy-cell" data-value="${escape(value)}">${escape(value)}</td>
</tr>
`

}

html+="</table><div id='copyMsg' style='margin-top:8px;color:#00ff88'></div>"

document.getElementById("modalDetails").innerHTML=html
document.getElementById("detailsModal").style.display="flex"

/* COPY TO CLIPBOARD */

document.querySelectorAll(".copy-cell").forEach(cell=>{

cell.style.cursor="pointer"

cell.onclick=function(){

let text = cell.dataset.value

navigator.clipboard.writeText(text)

let msg=document.getElementById("copyMsg")

msg.textContent="Copied: "+text

setTimeout(()=>msg.textContent="",1200)

}

})

}

/* CLOSE MODAL */

document.getElementById("closeModal").onclick=()=>{
document.getElementById("detailsModal").style.display="none"
}

document.getElementById("detailsModal").addEventListener("click",function(e){

if(e.target===this){
this.style.display="none"
}

})

function next(){
offset+=pageSize
load()
}

function prev(){
offset=Math.max(0,offset-pageSize)
load()
}

function showLogin(){
loginBox.style.display="block"
backendUI.style.display="none"
}

function showBackend(){
loginBox.style.display="none"
backendUI.style.display="block"
}

/* LOGIN */

document.getElementById("loginForm").onsubmit=async e=>{

e.preventDefault()

let pw=password.value

let res=await fetch("/api/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({password:pw})
})

let data=await res.json()

if(data.success){

authenticated=true
showBackend()
load()

}else{

loginError.innerText=data.error
loginError.style.display="block"

}

}

  /* POP UP */
function showToast(message, isSuccess = true) {
    const toast = document.createElement("div");

    toast.innerText = message;

    toast.style.position = "fixed";
    toast.style.bottom = "20px";
    toast.style.right = "20px";
    toast.style.padding = "12px 16px";
    toast.style.borderRadius = "8px";
    toast.style.color = "white";
    toast.style.fontSize = "14px";
    toast.style.zIndex = "9999";
    toast.style.boxShadow = "0 6px 20px rgba(0,0,0,0.2)";
    toast.style.background = isSuccess ? "#22c55e" : "#ef4444";

    document.body.appendChild(toast);

    setTimeout(() => {
        toast.remove();
    }, 3000);
}

/* SEARCH */

search.addEventListener("input",()=>{
clearTimeout(searchTimer)
searchTimer=setTimeout(()=>{
offset=0
load()
},300)
})

nextBtn.onclick=next
prevBtn.onclick=prev

showLogin()

</script>

</body>
</html>
