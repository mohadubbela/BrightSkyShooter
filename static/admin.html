<div id="adminPanel" class="panel hidden">

    <div class="dashboard-header">

        <div>

            <h2>Password Manager</h2>

            <p class="muted">
                Manage temporary access credentials
            </p>

        </div>

        <div class="system-status">
            <span class="status-dot"></span>
            ADMIN
        </div>

    </div>

    <div class="stats-grid">

        <div class="stat-card">
            <span>Active Passwords</span>
            <strong id="passwordCount">0</strong>
        </div>

        <div class="stat-card">
            <span>Access Level</span>
            <strong>Administrator</strong>
        </div>

        <div class="stat-card">
            <span>Status</span>
            <strong id="adminStatus">
                READY
            </strong>
        </div>

    </div>

    <form id="addPasswordForm">

        <div class="input-row">

            <input
                type="text"
                id="newPassword"
                placeholder="New password"
                required
            >

            <input
                type="number"
                id="expireMinutes"
                placeholder="Expire (hours)"
            >

            <button type="submit">
                Create Password
            </button>

        </div>

    </form>

    <div id="passwordList"></div>

</div>
